openapi: 3.0.3
info:
  title: cursor-projeto-dojo2 - API REST
  version: 1.0.0
  description: |
    API REST para gerenciamento de cálculo de médias acadêmicas de alunos de uma faculdade.
    
    ## Funcionalidades
    
    - Gestão de Cursos
    - Gestão de Disciplinas (vinculadas a cursos e professores)
    - Gestão de Alunos (matriculados em disciplinas)
    - Gestão de Professores (que lecionam disciplinas)
    - Registro de Notas (cada disciplina possui 2 notas por aluno)
    - Cálculo automático de médias com classificação de aprovação
    - Cursos profissionalizantes virtuais (CPV) e catálogo de áreas profissionalizantes
    
    ## Regras de Negócio
    
    ### Cálculo de Média
    - Média = (Nota 1 + Nota 2) / 2
    
    ### Classificação
    - **Aprovado**: Média >= 7.0
    - **Exame**: Média >= 5.0 e < 7.0
    - **Reprovado**: Média < 5.0
  contact:
    name: Equipe de Desenvolvimento
    email: dev@faculdade.edu.br
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api
    description: Servidor de Desenvolvimento

tags:
  - name: Cursos
    description: Operações relacionadas a cursos
  - name: Disciplinas
    description: Operações relacionadas a disciplinas
  - name: Alunos
    description: Operações relacionadas a alunos
  - name: Professores
    description: Operações relacionadas a professores
  - name: Matrículas
    description: Operações relacionadas a matrículas de alunos em disciplinas
  - name: Notas
    description: Operações relacionadas a notas e cálculo de médias
  - name: Cursos Profissionalizantes Virtuais
    description: CRUD e lifecycle de ofertas profissionalizantes remotas
  - name: Áreas Profissionalizantes
    description: Catálogo somente leitura (seed)

paths:
  /cursos:
    get:
      tags:
        - Cursos
      summary: Listar todos os cursos
      description: Retorna uma lista de todos os cursos cadastrados
      responses:
        '200':
          description: Lista de cursos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Curso'
    post:
      tags:
        - Cursos
      summary: Criar novo curso
      description: Cria um novo curso no sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CursoInput'
      responses:
        '201':
          description: Curso criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curso'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /areas-profissionalizantes:
    get:
      tags:
        - Áreas Profissionalizantes
      summary: Listar áreas profissionalizantes ativas
      operationId: listarAreasProfissionalizantes
      security:
        - basicAuth: []
      responses:
        '200':
          description: Lista de áreas ativas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AreaProfissionalizanteDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'

  /areas-profissionalizantes/{id}:
    get:
      tags:
        - Áreas Profissionalizantes
      summary: Buscar área profissionalizante por ID
      operationId: buscarAreaProfissionalizantePorId
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Área encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaProfissionalizanteDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          $ref: '#/components/responses/NaoEncontrado'

  /cursos-profissionalizantes-virtuais:
    get:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Listar cursos profissionalizantes virtuais ativos
      description: Retorna somente cursos com status ATIVO (FR-005).
      operationId: listarCursosProfissionalizantesVirtuais
      security:
        - basicAuth: []
      responses:
        '200':
          description: Lista de cursos ativos (pode ser vazia)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'

    post:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Cadastrar curso profissionalizante virtual
      operationId: criarCursoProfissionalizanteVirtual
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CursoProfissionalizanteVirtualInputDTO'
      responses:
        '201':
          description: Curso criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '400':
          $ref: '#/components/responses/ErroValidacao'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          description: Instituição não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroDTO'

  /cursos-profissionalizantes-virtuais/{id}:
    get:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Buscar curso por ID
      description: Inclui cursos desativados (histórico).
      operationId: buscarCursoProfissionalizanteVirtualPorId
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Curso encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          $ref: '#/components/responses/NaoEncontrado'

    put:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Atualizar curso (campos editáveis)
      description: Permite alterar descricao, area e carga horaria (FR-006). Nome e modalidade imutáveis.
      operationId: atualizarCursoProfissionalizanteVirtual
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CursoProfissionalizanteVirtualAtualizacaoInputDTO'
      responses:
        '200':
          description: Curso atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '400':
          $ref: '#/components/responses/ErroValidacao'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          $ref: '#/components/responses/NaoEncontrado'

  /cursos-profissionalizantes-virtuais/{id}/desativar:
    patch:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Desativar curso
      operationId: desativarCursoProfissionalizanteVirtual
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Curso desativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          $ref: '#/components/responses/NaoEncontrado'

  /cursos-profissionalizantes-virtuais/{id}/reativar:
    patch:
      tags:
        - Cursos Profissionalizantes Virtuais
      summary: Reativar curso desativado
      operationId: reativarCursoProfissionalizanteVirtual
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Curso reativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursoProfissionalizanteVirtualDTO'
        '401':
          $ref: '#/components/responses/NaoAutenticado'
        '404':
          $ref: '#/components/responses/NaoEncontrado'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    NaoAutenticado:
      description: Credenciais ausentes ou inválidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErroDTO'
    NaoEncontrado:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErroDTO'
    ErroValidacao:
      description: Erro de validação de negócio ou entrada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErroDTO'

  schemas:
    Curso:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID único do curso
        nome:
          type: string
          maxLength: 100
          description: Nome do curso
      required:
        - id
        - nome
    
    CursoInput:
      type: object
      properties:
        nome:
          type: string
          maxLength: 100
          description: Nome do curso
      required:
        - nome
    
    Erro:
      type: object
      properties:
        codigo:
          type: string
          description: Código do erro
        mensagem:
          type: string
          description: Mensagem descritiva do erro
        timestamp:
          type: string
          format: date-time
          description: Timestamp do erro
      required:
        - codigo
        - mensagem

    ErroDTO:
      type: object
      required:
        - codigo
        - mensagem
        - timestamp
      properties:
        codigo:
          type: string
          example: VALIDACAO
        mensagem:
          type: string
          example: Carga horária deve ser maior que zero
        timestamp:
          type: string
          format: date-time

    AreaProfissionalizanteDTO:
      type: object
      required:
        - id
        - codigo
        - nome
        - ativo
      properties:
        id:
          type: integer
          format: int64
        codigo:
          type: string
          maxLength: 20
          example: TEC
        nome:
          type: string
          maxLength: 100
          example: Tecnologia
        ativo:
          type: boolean

    CursoProfissionalizanteVirtualDTO:
      type: object
      required:
        - id
        - instituicaoId
        - instituicaoNome
        - areaProfissionalizanteId
        - areaProfissionalizanteNome
        - nome
        - cargaHoraria
        - modalidade
        - status
        - tipoCurso
        - dataCadastro
        - dataAtualizacao
      properties:
        id:
          type: integer
          format: int64
        instituicaoId:
          type: integer
          format: int64
        instituicaoNome:
          type: string
        areaProfissionalizanteId:
          type: integer
          format: int64
        areaProfissionalizanteNome:
          type: string
        nome:
          type: string
          maxLength: 100
        descricao:
          type: string
          maxLength: 2000
          nullable: true
        cargaHoraria:
          type: integer
          minimum: 1
          maximum: 9999
        modalidade:
          type: string
          enum:
            - VIRTUAL
        status:
          type: string
          enum:
            - ATIVO
            - DESATIVADO
        tipoCurso:
          type: string
          enum:
            - PROFISSIONALIZANTE
        dataCadastro:
          type: string
          format: date-time
        dataAtualizacao:
          type: string
          format: date-time

    CursoProfissionalizanteVirtualInputDTO:
      type: object
      required:
        - instituicaoId
        - nome
        - areaProfissionalizanteId
        - cargaHoraria
      properties:
        instituicaoId:
          type: integer
          format: int64
        nome:
          type: string
          maxLength: 100
        areaProfissionalizanteId:
          type: integer
          format: int64
        descricao:
          type: string
          maxLength: 2000
        cargaHoraria:
          type: integer
          minimum: 1
          maximum: 9999

    CursoProfissionalizanteVirtualAtualizacaoInputDTO:
      type: object
      required:
        - areaProfissionalizanteId
        - cargaHoraria
      properties:
        areaProfissionalizanteId:
          type: integer
          format: int64
        descricao:
          type: string
          maxLength: 2000
        cargaHoraria:
          type: integer
          minimum: 1
          maximum: 9999
